services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: instacar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d instacar"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./instacar-api
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_DIALECT: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: instacar
      JWT_SECRET: instacar_dev_secret
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "3000:3000"

  web:
    build:
      context: ./instacar
    depends_on:
      - api
    environment:
      - API_BASE_URL=http://api:3000
    ports:
      - "8080:80"

volumes:
  db_data:


